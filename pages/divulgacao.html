<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Divulgação | OURO SAFRA</title>
  <link rel="stylesheet" href="../assets/css/app.css" />
  <link rel="stylesheet" href="../assets/css/divulgacao.css" />
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <a class="burger" href="./home.html" title="Voltar">🏠</a>
        <img src="../assets/img/logo-novafrota.png" alt="OURO SAFRA" />
      </div>
      <div class="actions">
        <div class="icon-btn" title="Sair" data-logout>↩️</div>
      </div>
    </div>
  </div>

  <main class="container divulgacao-page">
    <header class="page-header">
      <div>
        <h1>Divulgação</h1>
        <p>Escolha o tipo da arte, preencha os campos e salve a imagem em JPG.</p>
      </div>
      <a class="btnTiny ghost" href="./home.html">Voltar</a>
    </header>

    <section class="templateCard" data-template="1">
      <div class="templateHeader">
        <h2>Modelo Ouro Safra</h2>
        <p>Escolha entre LANCE ou OPORTUNIDADE e preencha os campos.</p>
      </div>

      <div class="templateBody">
        <div class="templateForm">
          <label>TIPO</label>
          <select data-template="1" data-field="tipo">
            <option value="LANCE">DEMANDA PARA DAR LANCE</option>
            <option value="OPORTUNIDADE">DEMANDA OPORTUNIDADE</option>
          </select>

          <label>ID</label>
          <input data-template="1" data-field="id" placeholder="Ex: 74147" />

          <label>CIDADE</label>
          <input data-template="1" data-field="cidade" placeholder="Ex: RIO VERDE - GO" />

          <label>EMBARQUE</label>
          <input data-template="1" data-field="embarque" placeholder="Ex: FAZENDA SANTA RITA" />

          <label>DESTINO</label>
          <input data-template="1" data-field="destino" placeholder="Ex: SANTOS - SP" />

          <label>DESCARGA</label>
          <input data-template="1" data-field="descarga" placeholder="Ex: T39 / TERMINAL" />

          <label>SALDO</label>
          <input data-template="1" data-field="saldo" placeholder="Ex: 1.500 TON" />

          <label>VALOR</label>
          <input data-template="1" data-field="valor" placeholder="Ex: R$ 500,00" />
        </div>

        <div class="templatePreview" data-template-preview="1">
          <img class="previewBg" src="../assets/img/LANCE.png" alt="Arte Ouro Safra" />

          <div class="previewField previewField--id">
            <div class="previewText" data-bind="id" data-placeholder="00000"></div>
          </div>

          <div class="previewField previewField--cidade">
            <div class="previewText" data-bind="cidade" data-placeholder="RIO VERDE - GO"></div>
          </div>

          <div class="previewField previewField--embarque">
            <div class="previewText" data-bind="embarque" data-placeholder="LOCAL DE EMBARQUE"></div>
          </div>

          <div class="previewField previewField--destino">
            <div class="previewText" data-bind="destino" data-placeholder="DESTINO"></div>
          </div>

          <div class="previewField previewField--descarga">
            <div class="previewText" data-bind="descarga" data-placeholder="LOCAL DE DESCARGA"></div>
          </div>

          <div class="previewField previewField--saldo">
            <div class="previewText" data-bind="saldo" data-placeholder="0 TON"></div>
          </div>

          <div class="previewField previewField--valor">
            <div class="previewText" data-bind="valor" data-placeholder="R$ 0,00"></div>
          </div>
        </div>
      </div>

      <div class="templateActions">
        <button class="btnTiny green" data-action="save" data-template="1">Salvar JPG</button>
        <button class="btnTiny ghost" data-action="reset" data-template="1">Resetar</button>
      </div>
    </section>
  </main>

  <script src="../assets/js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="../assets/js/divulgacao.js"></script>
  <script>
    requireHomeAuth();
    bindLogoutButton();
  </script>
</body>
</html>
